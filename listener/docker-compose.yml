services:
  graphiti:
    image: zepai/graphiti:latest
    ports:
      - "8000:8000"
    volumes:
      - ./graphiti_patch/zep_graphiti.py:/app/graph_service/zep_graphiti.py:ro
      - ./graphiti_patch/ingest.py:/app/graph_service/routers/ingest.py:ro
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - OPENAI_API_KEY=${LITELLM_API_KEY}
      - OPENAI_BASE_URL=${LITELLM_BASE_URL}
      - MODEL_NAME=${LITELLM_MODEL:-gpt-4o-mini}
      - EMBEDDING_MODEL_NAME=${LITELLM_EMBEDDING_MODEL:-titan-embed-text-v2}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - PORT=8000
      - db_backend=neo4j

  neo4j:
    image: neo4j:5.26.2
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  neo4j_data:
